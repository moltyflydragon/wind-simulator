<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wind Simulator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="tool-group">
        <button id="btn-select" class="tool-btn active">SEL</button>
        <button id="btn-pencil" class="tool-btn">PEN</button>
        <button id="btn-line" class="tool-btn">LINE</button>
        <button id="btn-rect" class="tool-btn">RECT</button>
        <button id="btn-circle" class="tool-btn">CIRC</button>
        <button id="btn-stick" class="tool-btn">STICK</button>
      </div>
      <div class="tool-group">
        <button id="btn-toggle-sim" class="tool-btn">PLAY</button>
        <button id="btn-reset" class="tool-btn">RESET</button>
      </div>
      <div class="tool-group">
        <label>Wind <input id="wind-speed" type="range" min="0" max="80" value="30"></label>
        <span id="wind-speed-val">30 m/s</span>
        <label>Dir <input id="wind-dir" type="range" min="0" max="359" value="270"></label>
        <span id="wind-dir-val">270</span>
      </div>
      <div class="tool-group">
        <button id="btn-rot-ccw" class="tool-btn">-5</button>
        <button id="btn-rot-cw" class="tool-btn">+5</button>
        <button id="btn-delete" class="tool-btn danger">DEL</button>
      </div>
    </header>

    <div id="workspace">
      <canvas id="sim-canvas"></canvas>
      <aside id="meta-panel">
        <h3>Metadata</h3>
        <div id="meta-content">
          <p class="placeholder">Select an object</p>
        </div>
      </aside>
    </div>
  </div>

  <script src="js/vector.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/wind.js"></script>
  <script src="js/objects.js"></script>
  <script src="js/drawing.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
